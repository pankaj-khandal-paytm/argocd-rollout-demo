---
# 1. The Stable Service (Routes to the baseline/current version)
apiVersion: v1
kind: Service
metadata:
  name: nginx-stable
  namespace: default
spec:
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80

---
# 2. The Canary Service (Routes to the new preview version)
apiVersion: v1
kind: Service
metadata:
  name: nginx-canary
  namespace: default
spec:
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80

---
# 3. The Ingress (Manages the external traffic)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: my-nginx.local # We will use this to test traffic
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-stable
            port:
              number: 80

---
# 4. The Rollout (Now with Traffic Routing enabled!)
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx-rollout
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.26.0
        ports:
        - containerPort: 80
  strategy:
    canary:
      stableService: nginx-stable
      canaryService: nginx-canary
      trafficRouting:
        nginx:
          stableIngress: nginx-ingress
      steps:
      - experiment:
          #duration: 5m
          templates:
          - name: baseline
            specRef: stable
            #weight: 5
          - name: canary
            specRef: canary
            #weight: 5
      - pause: {}
      - experiment:
          #duration: 5m
          templates:
          - name: baseline
            specRef: stable
            #weight: 10
          - name: canary
            specRef: canary
            #weight: 10
      - pause: {}
      - setWeight: 100
